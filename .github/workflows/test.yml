name: test

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "24.x"
      - run: npm ci
      - run: npm run build
      # Validate that the compiled WASM only contains the expected features.
      # These features are set by rust/.cargo/config.toml target-feature flags.
      # build-std ensures std is also compiled with these flags.
      # bulk-memory-opt is an implied sub-feature of bulk-memory.
      - name: Validate WebAssembly features
        run: |
          expected="bulk-memory bulk-memory-opt mutable-globals nontrapping-float-to-int sign-ext"
          for target in nodejs web; do
            actual=$(npx --no-install wasm-opt --print-features $target/wasm_xlsxwriter_bg.wasm 2>&1 | sed -n 's/^--enable-//p' | sort | xargs)
            echo "$target: $actual"
            if [ "$actual" != "$expected" ]; then
              echo "::error::$target has unexpected features: $actual (expected: $expected)"
              exit 1
            fi
          done
      - run: npm test
      - run: |
          cd examples/nextjs
          npm ci
          npm run build
      - run: |
          cd examples/nodejs
          npm ci
          npm run build
          npm run start
      - run: |
          cd examples/vite
          npm ci
          npm run build
