name: npm publish

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  npm-publish:
    name: Publish npm package
    runs-on: ubuntu-latest
    permissions:
      # see: https://docs.npmjs.com/trusted-publishers#configuring-trusted-publishing
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "24.x"
          registry-url: "https://registry.npmjs.org"

      - run: npm ci
      - run: npm run build

      - name: Validate and publish (alpha)
        if: github.event_name == 'workflow_dispatch'
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [[ ! "$VERSION" =~ -alpha ]]; then
            echo "::error::workflow_dispatch requires alpha version (got $VERSION)"
            exit 1
          fi
          npm publish --provenance --access public --tag alpha

      - name: Validate and publish (release)
        if: github.event_name == 'push'
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="${{ github.ref_name }}"
          if [ "$TAG" != "v$VERSION" ]; then
            echo "::error::Tag $TAG does not match package.json version (expected $VERSION)"
            exit 1
          fi
          npm publish --provenance --access public
